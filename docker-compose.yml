# ============================================
# AkkuBooster — Production Docker Compose
# Single-VPS Deployment (Backend + Storefront + Postgres + Redis + Caddy)
# ============================================

name: akkubooster

services:
  # ── Reverse Proxy + Auto-HTTPS via Let's Encrypt ──
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
      - storefront
    networks:
      - akku

  # ── Medusa Backend ──
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file: .env.production
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD}@postgres:5432/akkubooster
      REDIS_URL: redis://redis:6379
      PORT: "9000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    expose:
      - "9000"
    volumes:
      - backend_uploads:/app/uploads
    networks:
      - akku

  # ── Next.js Storefront ──
  storefront:
    build:
      context: .
      dockerfile: storefront/Dockerfile
      args:
        # Build-time ENV (in den Client-Bundle gebacken)
        NEXT_PUBLIC_MEDUSA_BACKEND_URL: ${PUBLIC_BACKEND_URL}
        NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY: ${NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY}
        NEXT_PUBLIC_BASE_URL: ${PUBLIC_STOREFRONT_URL}
        NEXT_PUBLIC_DEFAULT_REGION: ${NEXT_PUBLIC_DEFAULT_REGION:-de}
        NEXT_PUBLIC_SANITY_PROJECT_ID: ${NEXT_PUBLIC_SANITY_PROJECT_ID}
        NEXT_PUBLIC_SANITY_DATASET: ${NEXT_PUBLIC_SANITY_DATASET:-production}
        NEXT_PUBLIC_SANITY_STUDIO_URL: ${NEXT_PUBLIC_SANITY_STUDIO_URL}
        NEXT_PUBLIC_STRIPE_KEY: ${NEXT_PUBLIC_STRIPE_KEY}
        NEXT_PUBLIC_PAYPAL_CLIENT_ID: ${NEXT_PUBLIC_PAYPAL_CLIENT_ID}
    restart: unless-stopped
    env_file: .env.production
    environment:
      NODE_ENV: production
      # Server-side fetcht direkt ueber das interne Docker-Netz (schneller, kein HTTPS-Roundtrip)
      MEDUSA_BACKEND_URL: http://backend:9000
    depends_on:
      backend:
        condition: service_started
    expose:
      - "8001"
    networks:
      - akku

  # ── PostgreSQL ──
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: akkubooster
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d akkubooster"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - akku

  # ── Redis (Event Bus + Cache) ──
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - akku

volumes:
  postgres_data:
  redis_data:
  backend_uploads:
  caddy_data:
  caddy_config:

networks:
  akku:
    driver: bridge
